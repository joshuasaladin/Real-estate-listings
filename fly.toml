# Fly.io config. Deploy with:  fly launch --no-deploy   (accept this file)
#   fly volume create listings_data --size 1
#   fly deploy
app = "aruba-homes"
primary_region = "mia"   # Miami — closest Fly region to Aruba

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DB_PATH = "/data/listings.db"

[[mounts]]
  source = "listings_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # keep the 4-hour scheduler alive
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
