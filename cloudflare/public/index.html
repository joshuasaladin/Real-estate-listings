<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aruba Homes — every listing on the island</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-row">
      <a class="brand" href="/">🏝️ <strong>Aruba Homes</strong></a>
      <nav class="header-meta">
        <span id="totalCount" class="pill">…</span>
        <span id="lastUpdated" class="muted"></span>
        <a href="/admin.html" class="muted admin-link">sync</a>
      </nav>
    </div>
  </header>

  <section class="filters">
    <div class="wrap">
      <div class="filter-row primary">
        <div class="seg" role="tablist">
          <button data-status="sale" class="seg-btn active">Buy</button>
          <button data-status="rent" class="seg-btn">Rent</button>
          <button data-status="" class="seg-btn">All</button>
        </div>
        <input id="q" type="search" placeholder="Search location, title, address…" />
        <select id="sort" aria-label="Sort">
          <option value="newest">Newest</option>
          <option value="price_asc">Price ↑</option>
          <option value="price_desc">Price ↓</option>
        </select>
        <div class="seg view-toggle">
          <button id="viewGrid" class="seg-btn active" title="Grid view">▦</button>
          <button id="viewMap" class="seg-btn" title="Map view">🗺</button>
        </div>
      </div>
      <div class="filter-row secondary">
        <select id="area"><option value="">Area</option></select>
        <select id="type"><option value="">Type</option></select>
        <select id="beds">
          <option value="">Beds</option>
          <option value="1">1+</option><option value="2">2+</option>
          <option value="3">3+</option><option value="4">4+</option><option value="5">5+</option>
        </select>
        <input id="minPrice" type="number" placeholder="Min $" min="0" />
        <input id="maxPrice" type="number" placeholder="Max $" min="0" />
        <select id="source"><option value="">Agency</option></select>
      </div>
    </div>
  </section>

  <main class="wrap">
    <div id="map" class="map hidden"></div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty hidden">No listings match these filters.</div>
    <div class="pager">
      <button id="prevPage" disabled>←</button>
      <span id="pageInfo"></span>
      <button id="nextPage" disabled>→</button>
    </div>

    <section class="directory">
      <h2>Agencies on this site</h2>
      <ul id="directory" class="directory-list"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap muted">
      Listings sync automatically every 4 hours and always link to the original
      agency. Prices in USD and AWG (ƒ1.79 = US$1).
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
